name: Fedora RPM Builder

# This tells GitHub to run this script every time you push to the 'master' branch
on:
  push:
    branches:
      - master

jobs:
  build-rpm:
    # THE MAGIC KEYWORD: This stops the job immediately unless your commit message contains "[build]"
    if: contains(github.event.head_commit.message, '[build]')
    
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Build RPM in Fedora Container
        # We spin up an official Fedora docker container to guarantee a perfect build environment
        run: |
          docker run --rm -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} fedora:latest /bin/bash -c "
            echo 'Installing build tools...'
            dnf install -y rpm-build rpmdevtools tar
            
            echo 'Setting up RPM tree...'
            rpmdev-setuptree
            
            echo 'Extracting version from spec file...'
            VERSION=\$(grep '^Version:' daily-tasks.spec | awk '{print \$2}')
            
            echo 'Packaging source files...'
            mkdir -p daily-tasks-\$VERSION
            cp app.py daemon.py icon.png daily-tasks-\$VERSION/
            tar -czf ~/rpmbuild/SOURCES/daily-tasks-\$VERSION.tar.gz daily-tasks-\$VERSION/
            cp dailytasks.desktop dailytasks-daemon.desktop ~/rpmbuild/SOURCES/
            cp daily-tasks.spec ~/rpmbuild/SPECS/
            
            echo 'Compiling RPM...'
            rpmbuild -ba ~/rpmbuild/SPECS/daily-tasks.spec
            
            echo 'Moving finished RPM to workspace...'
            cp ~/rpmbuild/RPMS/noarch/*.rpm ./
            chmod 777 ./*.rpm
          "

      - name: 📦 Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Tasks-RPM
          path: ./*.rpm
          retention-days: 14
